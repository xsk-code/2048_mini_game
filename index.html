<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>2048 - 马卡龙与暗夜</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
      touch-action: manipulation;
    }
    :root {
      --bg-primary: #FAF8EF;
      --text-primary: #776E65;
      --grid-bg: #BBADA0;
      --cell-bg: #CDC1B4;
      --cell-shadow: rgba(243, 215, 116, 0.8);
      --accent: #FF6B9D;
      --score-bg: #8F7A66;
      --btn-bg: #8F7A66;
      --btn-text: #FAF8EF;
    }
    .dark {
      --bg-primary: #1A1A2E;
      --text-primary: #EAEAEA;
      --grid-bg: #3D3D5C;
      --cell-bg: #4A4A6A;
      --accent: #FF6B9D;
      --score-bg: #2D2D44;
      --btn-bg: #4A4A6A;
      --btn-text: #EAEAEA;
    }
    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      transition: background 0.3s;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 90%;
      max-width: 400px;
      margin-bottom: 20px;
    }
    .title {
      font-size: 56px;
      font-weight: bold;
      color: var(--text-primary);
    }
    .scores {
      display: flex;
      gap: 8px;
    }
    .score-box {
      background: var(--score-bg);
      color: #FAF8EF;
      padding: 8px 16px;
      border-radius: 6px;
      text-align: center;
      min-width: 70px;
    }
    .score-label {
      font-size: 11px;
      text-transform: uppercase;
      opacity: 0.8;
    }
    .score-value {
      font-size: 20px;
      font-weight: bold;
    }
    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .theme-toggle:active {
      transform: scale(0.95);
    }
    .grid-container {
      background: var(--grid-bg);
      border-radius: 10px;
      padding: 12px;
      position: relative;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .cell {
      width: 75px;
      height: 75px;
      background: var(--cell-bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      color: var(--text-primary);
      transition: all 0.15s ease;
    }
    .dark .cell { color: #EAEAEA; }
    .cell[data-value="2"] { background: #FFEEF5; color: #776E65; }
    .cell[data-value="4"] { background: #FFE4EC; color: #776E65; }
    .cell[data-value="8"] { background: #FFC0D0; color: #FAF8EF; }
    .cell[data-value="16"] { background: #FFA0B8; color: #FAF8EF; }
    .cell[data-value="32"] { background: #FF8BA0; color: #FAF8EF; }
    .cell[data-value="64"] { background: #FF7092; color: #FAF8EF; }
    .cell[data-value="128"] { background: #FFE066; color: #FAF8EF; box-shadow: 0 0 20px var(--cell-shadow); }
    .cell[data-value="256"] { background: #FFD426; color: #FAF8EF; box-shadow: 0 0 20px var(--cell-shadow); }
    .cell[data-value="512"] { background: #FFC000; color: #FAF8EF; box-shadow: 0 0 25px var(--cell-shadow); }
    .cell[data-value="1024"] { background: #FFB300; color: #FAF8EF; font-size: 26px; box-shadow: 0 0 25px var(--cell-shadow); }
    .cell[data-value="2048"] { background: #FF9500; color: #FAF8EF; font-size: 26px; box-shadow: 0 0 30px rgba(255, 149, 0, 0.8); }
    .cell[data-value="4096"] { background: #FF5252; color: #FAF8EF; font-size: 26px; box-shadow: 0 0 30px rgba(255, 82, 82, 0.8); }
    .cell[data-value="8192"] { background: #9C27B0; color: #FAF8EF; font-size: 26px; box-shadow: 0 0 30px rgba(156, 39, 176, 0.8); }
    .cell.new {
      animation: popIn 0.2s ease;
    }
    .cell.merge {
      animation: merge 0.2s ease;
    }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes merge {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }
    .btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:active {
      transform: scale(0.95);
    }
    .btn-new {
      background: var(--accent);
    }
    .game-over {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(238, 228, 218, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .dark .game-over {
      background: rgba(45, 45, 68, 0.9);
    }
    .game-over.show {
      opacity: 1;
      pointer-events: auto;
    }
    .game-over-text {
      font-size: 42px;
      font-weight: bold;
      color: #776E65;
      margin-bottom: 20px;
    }
    .instructions {
      width: 90%;
      max-width: 400px;
      margin-top: 16px;
      font-size: 14px;
      color: var(--text-primary);
      text-align: center;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="container" :class="{ dark: isDark }">
      <button class="theme-toggle" @click="toggleTheme">
        {{ isDark ? '☀️ 切换马卡龙' : '🌙 切换暗夜' }}
      </button>
      
      <div class="header">
        <div class="title">2048</div>
        <div class="scores">
          <div class="score-box">
            <div class="score-label">分数</div>
            <div class="score-value">{{ score }}</div>
          </div>
          <div class="score-box">
            <div class="score-label">最高</div>
            <div class="score-value">{{ best }}</div>
          </div>
        </div>
      </div>
      
      <div class="grid-container">
        <div class="grid">
          <div v-for="(cell, index) in cells" :key="index" 
               class="cell" 
               :data-value="cell"
               :class="{ new: newCells.includes(index), merge: mergeCells.includes(index) }">
            {{ cell || '' }}
          </div>
        </div>
        <div class="game-over" :class="{ show: gameOver }">
          <div class="game-over-text">游戏结束</div>
          <button class="btn btn-new" @click="newGame">再来一局</button>
        </div>
      </div>
      
      <div class="controls">
        <button class="btn btn-new" @click="newGame">新游戏</button>
      </div>
      
      <div class="instructions">
        使用方向键或滑动屏幕移动方块<br>
        相同数字的方块会合并成更大的数字
      </div>
    </div>
  </div>

  <script type="module">
    import { createApp, ref, computed, onMounted, onUnmounted } from 'vue'

    createApp({
      setup() {
        const GRID_SIZE = 4
        const cells = ref(Array(GRID_SIZE * GRID_SIZE).fill(0))
        const score = ref(0)
        const best = ref(parseInt(localStorage.getItem('2048-best') || '0'))
        const gameOver = ref(false)
        const isDark = ref(localStorage.getItem('2048-theme') === 'dark')
        const newCells = ref([])
        const mergeCells = ref([])

        function getEmptyCells() {
          return cells.value.map((v, i) => v === 0 ? i : -1).filter(i => i !== -1)
        }

        function addRandomTile() {
          const empty = getEmptyCells()
          if (empty.length === 0) return false
          const index = empty[Math.floor(Math.random() * empty.length)]
          cells.value[index] = Math.random() < 0.9 ? 2 : 4
          newCells.value = [index]
          setTimeout(() => { newCells.value = [] }, 200)
          return true
        }

        function slide(row) {
          let arr = row.filter(v => v !== 0)
          let result = []
          let gained = 0
          for (let i = 0; i < arr.length; i++) {
            if (i < arr.length - 1 && arr[i] === arr[i + 1]) {
              const merged = arr[i] * 2
              result.push(merged)
              gained += merged
              i++
            } else {
              result.push(arr[i])
            }
          }
          while (result.length < GRID_SIZE) result.push(0)
          return { row: result, gained }
        }

        function rotate(grid, times = 1) {
          let g = grid.map((v, i) => [...v])
          for (let t = 0; t < times; t++) {
            const n = []
            for (let i = 0; i < GRID_SIZE; i++) {
              n[i] = []
              for (let j = 0; j < GRID_SIZE; j++) {
                n[i][j] = g[GRID_SIZE - 1 - j][i]
              }
            }
            g = n
          }
          return g
        }

        function move(direction) {
          if (gameOver.value) return
          
          let g = []
          for (let i = 0; i < GRID_SIZE; i++) {
            g.push(cells.value.slice(i * GRID_SIZE, (i + 1) * GRID_SIZE))
          }

          let rotations = { left: 0, up: 1, right: 2, down: 3 }
          g = rotate(g, rotations[direction])
          
          let totalGain = 0
          const oldCells = [...cells.value]
          const mergedPositions = []

          g = g.map((row, i) => {
            const { row: newRow, gained } = slide(row)
            totalGain += gained
            if (gained > 0) {
              for (let j = 0; j < GRID_SIZE; j++) {
                if (newRow[j] > 0 && (j === 0 || newRow[j] !== newRow[j - 1])) {
                  const originalIndex = rotate([[i, j]])[0]
                  mergedPositions.push(originalIndex[0] * GRID_SIZE + originalIndex[1])
                }
              }
            }
            return newRow
          })

          g = rotate(g, (4 - rotations[direction]) % 4)
          
          cells.value = g.flat()
          
          if (!cells.value.every((v, i) => v === oldCells[i])) {
            score.value += totalGain
            if (score.value > best.value) {
              best.value = score.value
              localStorage.setItem('2048-best', best.value.toString())
            }
            addRandomTile()
          }

          if (getEmptyCells().length === 0) {
            if (!canMove()) gameOver.value = true
          }

          mergeCells.value = mergedPositions
          setTimeout(() => { mergeCells.value = [] }, 200)
        }

        function canMove() {
          const g = []
          for (let i = 0; i < GRID_SIZE; i++) {
            g.push(cells.value.slice(i * GRID_SIZE, (i + 1) * GRID_SIZE))
          }
          for (let row of g) {
            for (let i = 0; i < row.length - 1; i++) {
              if (row[i] === row[i + 1]) return true
            }
          }
          for (let i = 0; i < GRID_SIZE; i++) {
            for (let j = 0; j < GRID_SIZE - 1; j++) {
              if (g[j][i] === g[j + 1][i]) return true
            }
          }
          return false
        }

        function newGame() {
          cells.value = Array(GRID_SIZE * GRID_SIZE).fill(0)
          score.value = 0
          gameOver.value = false
          newCells.value = []
          mergeCells.value = []
          addRandomTile()
          addRandomTile()
        }

        function toggleTheme() {
          isDark.value = !isDark.value
          localStorage.setItem('2048-theme', isDark.value ? 'dark' : 'light')
        }

        function handleKeydown(e) {
          const keyMap = {
            ArrowLeft: 'left', ArrowRight: 'right', 
            ArrowUp: 'up', ArrowDown: 'down'
          }
          if (keyMap[e.key]) {
            e.preventDefault()
            move(keyMap[e.key])
          }
        }

        let touchStartX = 0, touchStartY = 0
        function handleTouchStart(e) {
          touchStartX = e.touches[0].clientX
          touchStartY = e.touches[0].clientY
        }
        function handleTouchEnd(e) {
          const dx = e.changedTouches[0].clientX - touchStartX
          const dy = e.changedTouches[0].clientY - touchStartY
          const absDx = Math.abs(dx)
          const absDy = Math.abs(dy)
          if (Math.max(absDx, absDy) < 30) return
          if (absDx > absDy) {
            move(dx > 0 ? 'right' : 'left')
          } else {
            move(dy > 0 ? 'down' : 'up')
          }
        }

        onMounted(() => {
          newGame()
          window.addEventListener('keydown', handleKeydown)
          document.addEventListener('touchstart', handleTouchStart, { passive: true })
          document.addEventListener('touchend', handleTouchEnd, { passive: true })
        })

        onUnmounted(() => {
          window.removeEventListener('keydown', handleKeydown)
          document.removeEventListener('touchstart', handleTouchStart)
          document.removeEventListener('touchend', handleTouchEnd)
        })

        return { cells, score, best, gameOver, isDark, newCells, mergeCells, newGame, toggleTheme }
      }
    }).mount('#app')
  </script>
</body>
</html>
